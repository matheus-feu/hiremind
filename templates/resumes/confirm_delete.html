{% extends "base.html" %}
{% block content %}

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <h3>Confirmar exclusão</h3>
            <p>Tem certeza que deseja excluir <strong>{{ object }}</strong>? Esta ação não pode ser desfeita.</p>
            <form method="post">{% csrf_token %}
                <button class="btn btn-danger" type="submit"><i class="bi bi-trash"></i> Excluir</button>
                <a class="btn btn-outline-secondary" href="javascript:history.back()">Cancelar</a>
            </form>
        </div>
    </div>
{% endblock %}
