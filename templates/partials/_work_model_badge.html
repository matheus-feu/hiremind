<!-- Badge para Modelo de Trabalho -->
{% if job.work_model == 'remote' %}
    <span class="badge bg-success">
        <i class="bi bi-house"></i> {{ job.get_work_model_display }}
    </span>
{% elif job.work_model == 'hybrid' %}
    <span class="badge bg-warning text-dark">
        <i class="bi bi-diagram-3"></i> {{ job.get_work_model_display }}
    </span>
{% else %}
    <span class="badge bg-secondary">
        <i class="bi bi-building"></i> {{ job.get_work_model_display }}
    </span>
{% endif %}
